<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" width="1200" height="628">
  <!-- Background -->
  <rect width="1200" height="628" fill="#0f0f1a"/>

  <!-- Title -->
  <text x="600" y="78" fill="#e2e8f0" font-size="54" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">TurboQuant</text>
  <text x="600" y="118" fill="#94a3b8" font-size="21" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Near-Optimal Vector Quantization via Random Rotation · arXiv:2504.19874</text>

  <!-- ── Left panel (Naive) ───────────────────────── -->
  <rect x="40" y="148" width="400" height="300" rx="8" fill="#16213e" stroke="#1e2a45" stroke-width="1.5"/>
  <!-- zero line (z=298, same for both panels) -->
  <line x1="40" y1="298" x2="440" y2="298" stroke="#2d3a56" stroke-width="1.5"/>
  <!-- horizontal grid -->
  <line x1="40" y1="203" x2="440" y2="203" stroke="#1e2a45" stroke-width="0.5"/>
  <line x1="40" y1="393" x2="440" y2="393" stroke="#1e2a45" stroke-width="0.5"/>

  <!-- Quantization levels (wide–spaced, naive): at y≈188, 256, 324, 392 -->
  <line x1="44" y1="188" x2="436" y2="188" stroke="#34d399" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.7"/>
  <line x1="44" y1="256" x2="436" y2="256" stroke="#34d399" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.7"/>
  <line x1="44" y1="324" x2="436" y2="324" stroke="#34d399" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.7"/>
  <line x1="44" y1="392" x2="436" y2="392" stroke="#34d399" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.7"/>

  <!-- Bars (8 dims shown, 42px wide, 4px gap, sc=31.5 px/unit) -->
  <!-- bar0 v=3.5  bh=110  x=44  y=188  RED outlier -->
  <rect x="44"  y="188" width="42" height="110" fill="#f43f5e" rx="2"/>
  <!-- bar1 v=2.8  bh=88   x=90  y=210  RED outlier -->
  <rect x="90"  y="210" width="42" height="88"  fill="#f43f5e" rx="2"/>
  <!-- bar2 v=0.3  bh=9    x=136 y=289  BLUE small -->
  <rect x="136" y="289" width="42" height="9"   fill="#38bdf8" rx="1"/>
  <!-- bar3 v=0.2  bh=6    x=182 y=292 -->
  <rect x="182" y="292" width="42" height="6"   fill="#38bdf8" rx="1"/>
  <!-- bar4 v=-0.4 bh=13   x=228 y=298 (below zero) -->
  <rect x="228" y="298" width="42" height="13"  fill="#38bdf8" rx="1"/>
  <!-- bar5 v=0.3  bh=9    x=274 y=289 -->
  <rect x="274" y="289" width="42" height="9"   fill="#38bdf8" rx="1"/>
  <!-- bar6 v=-2.7 bh=85   x=320 y=298 RED outlier (negative) -->
  <rect x="320" y="298" width="42" height="85"  fill="#f43f5e" rx="2"/>
  <!-- bar7 v=-3.0 bh=94   x=366 y=298 RED outlier (negative) -->
  <rect x="366" y="298" width="42" height="94"  fill="#f43f5e" rx="2"/>

  <!-- error highlight overlay on bar0 (rounds to 3.5 → ok, but bar2–bar5 big error) -->
  <rect x="136" y="256" width="42" height="42" fill="rgba(244,63,94,0.25)" rx="1"/>
  <rect x="182" y="256" width="42" height="44" fill="rgba(244,63,94,0.25)" rx="1"/>
  <rect x="228" y="256" width="42" height="68" fill="rgba(244,63,94,0.25)" rx="1"/>
  <rect x="274" y="256" width="42" height="42" fill="rgba(244,63,94,0.25)" rx="1"/>

  <!-- Left panel label -->
  <text x="240" y="466" fill="#f43f5e" font-size="18" text-anchor="middle" font-family="system-ui">❌ Naive Quantization</text>
  <text x="240" y="488" fill="#f43f5e" font-size="16" text-anchor="middle" font-family="monospace">MSE = 0.637</text>

  <!-- ── Arrow ──────────────────────────────────────── -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
  <line x1="458" y1="298" x2="742" y2="298" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="600" y="278" fill="#e2e8f0" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">x′ = D · H · P · x</text>
  <text x="600" y="326" fill="#94a3b8" font-size="14" text-anchor="middle" font-family="system-ui">FWHT Rotation</text>

  <!-- ── Right panel (TurboQuant) ─────────────────── -->
  <rect x="760" y="148" width="400" height="300" rx="8" fill="#16213e" stroke="#1e2a45" stroke-width="1.5"/>
  <line x1="760" y1="298" x2="1160" y2="298" stroke="#2d3a56" stroke-width="1.5"/>
  <line x1="760" y1="203" x2="1160" y2="203" stroke="#1e2a45" stroke-width="0.5"/>
  <line x1="760" y1="393" x2="1160" y2="393" stroke="#1e2a45" stroke-width="0.5"/>

  <!-- Quantization levels (tight-spaced, TQ): at y≈261, 284, 308, 331 -->
  <line x1="764" y1="261" x2="1156" y2="261" stroke="#34d399" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.85"/>
  <line x1="764" y1="284" x2="1156" y2="284" stroke="#34d399" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.85"/>
  <line x1="764" y1="308" x2="1156" y2="308" stroke="#34d399" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.85"/>
  <line x1="764" y1="331" x2="1156" y2="331" stroke="#34d399" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.85"/>

  <!-- Bars (8 dims, all ~uniform height, GREEN) -->
  <!-- bar0 v=0.85  bh=27 x=764 y=271 -->
  <rect x="764"  y="271" width="42" height="27" fill="#34d399" rx="2"/>
  <!-- bar1 v=-1.05 bh=33 x=810 y=298 -->
  <rect x="810"  y="298" width="42" height="33" fill="#34d399" rx="2"/>
  <!-- bar2 v=0.72  bh=23 x=856 y=275 -->
  <rect x="856"  y="275" width="42" height="23" fill="#34d399" rx="2"/>
  <!-- bar3 v=-0.53 bh=17 x=902 y=298 -->
  <rect x="902"  y="298" width="42" height="17" fill="#34d399" rx="2"/>
  <!-- bar4 v=1.18  bh=37 x=948 y=261 -->
  <rect x="948"  y="261" width="42" height="37" fill="#34d399" rx="2"/>
  <!-- bar5 v=-0.77 bh=24 x=994 y=298 -->
  <rect x="994"  y="298" width="42" height="24" fill="#34d399" rx="2"/>
  <!-- bar6 v=0.65  bh=20 x=1040 y=278 -->
  <rect x="1040" y="278" width="42" height="20" fill="#34d399" rx="2"/>
  <!-- bar7 v=-0.91 bh=29 x=1086 y=298 -->
  <rect x="1086" y="298" width="42" height="29" fill="#34d399" rx="2"/>

  <!-- Right panel label -->
  <text x="960" y="466" fill="#34d399" font-size="18" text-anchor="middle" font-family="system-ui">✓ TurboQuant</text>
  <text x="960" y="488" fill="#34d399" font-size="16" text-anchor="middle" font-family="monospace">MSE = 0.050</text>

  <!-- ── Bottom improvement badge ──────────────────── -->
  <rect x="330" y="510" width="540" height="42" rx="6" fill="rgba(251,191,36,0.07)" stroke="#fbbf24" stroke-width="1"/>
  <text x="600" y="536" fill="#fbbf24" font-size="22" font-weight="bold" text-anchor="middle" font-family="system-ui">⚡ 12.7× lower MSE — same 2-bit budget</text>

  <!-- Footer -->
  <text x="600" y="598" fill="#475569" font-size="13" text-anchor="middle" font-family="system-ui">Zandieh, Daliri, Hadian, Mirrokni · Google Research · arXiv:2504.19874</text>
</svg>
