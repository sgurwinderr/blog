name: Check Image Alt Text
on:
  push:
    paths:
      - 'content/**'
      - 'layouts/**'

jobs:
  check-alt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown for images without alt text
        run: |
          echo "Checking markdown files..."
          if grep -rn '!\[]\|!\[\s*]' content/; then
            echo "❌ Found images without alt text"
            exit 1
          else
            echo "✅ All markdown images have alt text"
          fi

      - name: Install Hugo and build
        run: |
          wget -O hugo.deb https://github.com/gohugoio/hugo/releases/download/v0.159.1/hugo_extended_0.159.1_linux-amd64.deb
          sudo dpkg -i hugo.deb
          hugo --minify

      - name: Check HTML for images without alt
        run: |
          if grep -r '<img' public/ | grep -v 'alt='; then
            echo "❌ Found HTML images without alt"
            exit 1
          else
            echo "✅ All HTML images have alt"
          fi
