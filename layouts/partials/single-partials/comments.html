{{ $shortname := .Site.Config.Services.Disqus.Shortname }}
{{ if $shortname }}
<div class="container mt-5" id="comments-section">
    <div class="row">
        <div class="col-md-9 offset-md-2">
            <div class="disqus-wrapper">
                <h4 class="disqus-title">Comments</h4>
                {{ if hugo.IsServer }}
                    <p style="color:#888;font-size:0.9rem;padding:20px 0;">
                        💬 Disqus comments are disabled on localhost. They will appear on your live site.
                    </p>
                {{ else }}
                <div id="disqus_thread"></div>
                <script>
                    var disqus_config = function () {
                        this.page.url  = '{{ .Permalink }}';
                        this.page.identifier = '{{ .RelPermalink }}';
                    };
                    (function() {
                        var d = document, s = d.createElement('script');
                        s.src = 'https://{{ $shortname }}.disqus.com/embed.js';
                        s.setAttribute('data-timestamp', +new Date());
                        (d.head || d.body).appendChild(s);
                    })();
                </script>
                <noscript>
                    Please enable JavaScript to view the
                    <a href="https://disqus.com/?ref_noscript" rel="nofollow">comments powered by Disqus.</a>
                </noscript>
                {{ end }}
            </div>
        </div>
    </div>
</div>
{{ end }}
